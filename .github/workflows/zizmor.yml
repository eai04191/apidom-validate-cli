name: zizmor

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Upload SARIF findings to GitHub code scanning
      contents: read # Read workflow files being audited
      actions: read # Required for private/internal repo analysis
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: pedantic
